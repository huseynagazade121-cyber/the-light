<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #0b0000; /* Çox tünd qırmızı-qara fon */
            color: #ff3333; /* Gözəl, parlaq qırmızı yazı */
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 30px;
            overflow: hidden;
        }
        #login { 
            text-align: center; 
            border: 1px solid #660000;
            padding: 40px;
            border-radius: 10px;
            background: rgba(20, 0, 0, 0.8);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
        }
        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #ff3333;
            color: #fff;
            padding: 10px;
            font-size: 20px;
            text-align: center;
            outline: none;
            width: 200px;
            margin-top: 15px;
        }
        #message {
            display: none;
            width: 100%;
            max-width: 750px;
            font-size: 19px;
            line-height: 1.8;
            color: #ffcccc; /* Oxunması rahat olsun deyə yazı rəngini bir az yumşaltdıq */
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
        }
        .cursor {
            color: #ff3333;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="login">
    <div style="font-size: 14px; margin-bottom: 10px; letter-spacing: 2px;">SİSTEMƏ GİRİŞ</div>
    <input type="text" id="pass" placeholder="..." oninput="start()">
</div>

<div id="message"></div>

<script>
    const text = "Bax dostum, qardaşım...\n\nBəlkə də indiyə qədər heç kim sənə bunları deməyib, amma mən demək istəyirəm. Sən mənim bu həyatda tanıdığım ən düzgün, xarakteri ən möhkəm oğlanlardan birisən. Özünü əsla başqaları ilə müqayisə etmə, sən başqalarından çox fərqlisən.\n\nÜzündəki o xırda-para şeylərə, prişiklərinə görə heç vaxt sıxılma. İnan mənə, bunların hamısı keçicidir, bir müddət sonra heç biri qalmayacaq. Sənin o eynəyin isə sənə zəiflik yox, bir intellektual hava, bir ağırlıq verir. Atan DTX-də, mənimki DSX-də — hər ikimiz hərbiçi övladıyıq, bizim qanımızda dik durmaq var. Sən o uşaqlardan deyilsən ki, hər yetənə söz desin, hər qızın arxasınca qaçsın. Sənin bu 'asosyallığın' əslində sənin ciddiliyindir, hər kəslə bir olmamağındır.\n\nCəmilə məsələsinə gəlincə, heç qorxma. Sən o qızdan əskik deyilsən, əksinə, sənin kimi daxili dünyası zəngin olan birini tanısa, o özü sənə tərəf addım atar. Sən bomba oğlansan, öz biliklərinlə, öz texniki bacarığınla hər kəsə meydan oxuyarsan. Dik dur, eynəyini düzəlt və özünə güvən. Sən tək deyilsən, mən hər zaman yanındayam və sənin arxandayam.\n\nSən mənim dünyada gördüyüm ən yaxşı dostumsan.";

    function start() {
        if(document.getElementById('pass').value.toLowerCase() === "dost") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            let i = 0;
            function typing() {
                if (i < text.length) {
                    document.getElementById("message").innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, 40); 
                } else {
                    document.getElementById("message").innerHTML += '<span class="cursor"> _</span>';
                }
            }
            typing();
        }
    }
</script>

</body>
</html>
