<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Terminal Efekti Üçün Əsas Stil */
        body {
            background-color: #050000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase; /* Terminal havası üçün hərfləri böyük edir */
        }

        /* Ekranın üzərindəki xətlər (CRT Scanlines) */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Ekranın titrəmə effekti */
        #screen {
            width: 80%;
            max-width: 800px;
            padding: 20px;
            border: 2px solid #440000;
            background: rgba(15, 0, 0, 0.9);
            box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.2), 0 0 20px rgba(255, 0, 0, 0.1);
            position: relative;
        }

        #login { text-align: left; }
        
        .prompt { color: #ff0000; margin-right: 10px; }

        input {
            background: transparent;
            border: none;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            outline: none;
            width: 70%;
        }

        #message {
            display: none;
            font-size: 18px;
            line-height: 1.5;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
        }

        .cursor {
            background: #ff0000;
            display: inline-block;
            width: 10px;
            height: 18px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="screen">
    <div id="login">
        <span class="prompt">ROOT@SYSTEM:~#</span>
        <input type="text" id="pass" placeholder="ENTER ACCESS KEY..." oninput="start()" autofocus>
    </div>
    <div id="message"></div>
</div>

<script>
    const text = "SİSTEMƏ GİRİŞ EDİLDİ...\n----------------------\nBAX DOSTUM, QARDAŞIM...\n\nSƏN MƏNİM TANIDIĞIM ƏN DÜZGÜN VƏ XARAKTERİ MÖHKƏM OĞLANLARDAN BİRİSƏN. ÖZÜNÜ ƏSLA BAŞQALARI İLƏ MÜQAYİSƏ ETMƏ.\n\nPRİJİKLƏRƏ VƏ EYNƏYƏ FİKİR VERMƏ, BUNLAR KEÇİCİDİR. SƏNİN GÜCÜN DAXİLİNDƏDİR. ATAN DTX-DƏ, MƏNİMKİ DSX-DƏ - BİZİM QANIMIZDA DİK DURMAQ VAR.\n\nCƏMİLƏ MƏSƏLƏSİNDƏ DƏ QORXMA. SƏNİN KİMİ BİRİNİ TANISA, HEYRAN QALAR. MƏN HƏMİŞƏ YANINDAYAM.\n\nSƏN MƏNİM ƏN YAXŞI DOSTUMSAN.";

    function start() {
        if(document.getElementById('pass').value.toLowerCase() === "dost") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            let i = 0;
            const target = document.getElementById("message");
            
            function typing() {
                if (i < text.length) {
                    target.innerHTML = text.substring(0, i) + '<span class="cursor"></span>';
                    i++;
                    setTimeout(typing, 40);
                } else {
                    target.innerHTML = text + '<br><br>[SİSTEM BAĞLANDI]<span class="cursor"></span>';
                }
            }
            typing();
        }
    }
</script>

</body>
</html>
