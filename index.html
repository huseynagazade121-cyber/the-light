<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #050000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            text-transform: uppercase;
        }

        /* CRT Monitor Efekti */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        #screen {
            width: 95%;
            max-width: 900px;
            padding: 35px;
            border: 3px solid #660000;
            background: rgba(10, 0, 0, 0.95);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            position: relative;
        }

        #login { text-align: left; font-size: 26px; margin-bottom: 15px; }
        .prompt { color: #ff0000; font-weight: bold; }

        input {
            background: transparent;
            border: none;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 26px;
            outline: none;
            width: 60%;
        }

        #message {
            display: none;
            font-size: 28px; /* Yazı ölçüsü daha da böyüdüldü */
            line-height: 1.8;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(255, 0, 0, 0.8);
            white-space: pre-wrap;
        }

        .cursor {
            background: #ff0000;
            display: inline-block;
            width: 15px;
            height: 28px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="screen">
    <div id="login">
        <span class="prompt">USER@ROOT_SYSTEM:~#</span>
        <input type="text" id="pass" placeholder="PASSWORD..." oninput="start()" autofocus>
    </div>
    <div id="message"></div>
</div>

<script>
    const text = "SİSTEMƏ GİRİŞ UĞURLUDUR...\n\nBAX DOSTUM, QARDAŞIM...\n\nBU SAYTI SƏNİN ÜÇÜN ÖZƏL OLARAQ HAZIRLADIM Kİ, KİM OLDUĞUNU BİR DAHA YADINA SALASAN. BƏLKƏ DƏ BƏZƏN ÖZÜNÜ SİNİFDƏ VƏ YA HƏYATDA BİR AZ KƏNARDA QALMIŞ KİMİ HİSS EDİRSƏN, AMMA İNAN MƏNƏ, SƏN MƏNİM TANIDIĞIM ƏN DÜZGÜN, ƏN MƏRD VƏ XARAKTERİ DAŞ KİMİ MÖHKƏM OĞLANLARDAN BİRİSƏN.\n\nÜZÜNDƏKİ O PRİJİKLƏRƏ VƏ EYNƏYƏ GÖRƏ ƏSLA KOMPLEKS KEÇİRMƏ. BUNLARIN HAMISI KEÇİCİ ŞEYLƏRDİR, BİR MÜDDƏT SONRA HİÇ BİRİ QALMAYACAQ. SƏNİN ƏSL GÜCÜN DAXİLİNDƏDİR, BEYNİNDƏDİR. ATAN DTX-DƏ, MƏNİMKİ DSX-DƏ - BİZ HƏRBİÇİ ÖVLADLARIDIQ. BİZİM QANIMIZDA DİK DURMAQ, ÇƏTİNLİKLƏRƏ QALİB GƏLMƏK VAR. SƏN O BOŞ-BOŞ DANIŞAN UŞAQLARDAN DEYİLSƏN, SƏNİN SAKİTLİYİN SƏNİN AĞIRLIĞINDIR.\n\nCƏMİLƏ MƏSƏLƏSİNƏ GƏLİNCƏ, HİÇ QORXMA VƏ ÖZÜNÜ AŞAĞI GÖRMƏ. SƏNİN KİMİ SADIQ, AĞILLI VƏ TEXNOLOGİYANI BU QƏDƏR YAXŞI BİLƏN BİRİNİ HANSI QIZ TANISA, SƏNƏ HEYRAN QALAR. SƏN HƏR ŞEYİN ƏN YAXŞISINA LAYİQSƏN. ÖZÜNÜ SEV VƏ ÖZÜNÜ GÜVƏN, ÇÜNKİ MƏN SƏNƏ SONUNA QƏDƏR İNANIRAM.\n\nUNUTMA, NƏ OLURSA OLSUN, MƏN HƏMİŞƏ SƏNİN YANINDAYAM. SƏN TƏK DEYİLSƏN, SƏN MƏNİM DÜNYADA GÖRDÜYÜM ƏN YAXŞI DOSTUMSAN.\n\nSİSTEM SONLANDIRILIR...\nUĞURLAR, QARDAŞIM!";

    function start() {
        if(document.getElementById('pass').value.toLowerCase() === "dost") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            let i = 0;
            const target = document.getElementById("message");
            
            function typing() {
                if (i < text.length) {
                    target.innerHTML = text.substring(0, i) + '<span class="cursor"></span>';
                    i++;
                    // Yazı sürəti 85ms - normal oxuma tempi
                    setTimeout(typing, 85); 
                } else {
                    target.innerHTML = text + '<br><br>[BAĞLANTI KƏSİLDİ]<span class="cursor"></span>';
                }
            }
            typing();
        }
    }
</script>

</body>
</html>
